name: pillpicking
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # System dependencies for Raspberry Pi
  - sqlite
  - libffi
  - openssl
  - pip:
    # GUI Framework - optimized for ARM/Raspberry Pi
    - PySide6>=6.5.0
    # Serial Communication
    - pyserial>=3.5
    # Testing Framework
    - pytest>=7.0.0
    - pytest-qt>=4.2.0
    # Development Tools
    - black>=23.0.0
    - flake8>=6.0.0
    # Packaging and Deployment
    - PyInstaller>=5.10.0
    # Configuration and Environment
    - python-dotenv>=1.0.0
    # Date/Time utilities
    - python-dateutil>=2.8.0
    # Raspberry Pi GPIO support (optional)
    - RPi.GPIO>=0.7.1; sys_platform == "linux"
    # Performance monitoring
    - psutil>=5.9.0